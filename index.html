<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>NickFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #e85d2f;
      --orange-dark: #c94b22;
      --green: #2ecc71;
      --bg: #0f0f0f;
      --bg2: #161616;
      --bg3: #1a1a1a;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --text: #f0ede8;
      --text-dim: #888;
      --text-muted: #555;
    }

    html, body {
      background: var(--bg);
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* ---- AUTH SCREEN ---- */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 24px;
      gap: 20px;
      text-align: center;
    }

    .auth-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 80px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .auth-tagline {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 260px;
      line-height: 1.6;
    }

    .auth-btn {
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px 32px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-btn:active { transform: scale(0.96); background: var(--orange-dark); }

    .error-msg {
      font-size: 13px;
      color: var(--orange);
      padding: 10px 16px;
      background: rgba(232,93,47,0.1);
      border-radius: 10px;
      max-width: 300px;
      line-height: 1.5;
    }

    /* ---- MAIN APP ---- */
    #main-screen { display: flex; flex-direction: column; height: 100%; }
    #main-screen.hidden { display: none; }
    #auth-screen.hidden { display: none; }

    /* Header */
    .header {
      padding: 48px 20px 0;
      background: var(--bg);
      flex-shrink: 0;
    }

    .header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .app-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--orange);
    }

    .date-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* Day chips */
    .day-chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .day-chips::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .chip.active {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }

    /* Day heading */
    .day-heading {
      padding: 14px 20px 0;
    }

    .day-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .day-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0 0;
    }

    /* Exercises list */
    .exercises {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 24px;
    }

    .section-label {
      padding: 14px 20px 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
    }

    .note-row {
      padding: 4px 20px 0;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .exercise-row {
      display: flex;
      align-items: center;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .ex-info { flex: 1; min-width: 0; }

    .ex-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
    }

    .ex-prev {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .ex-prev b { color: var(--text-dim); font-weight: 600; }

    .ex-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .ex-input {
      width: 76px;
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 15px;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    .ex-input:focus { border-color: var(--orange); background: var(--bg2); }
    .ex-input.saved { border-color: var(--green); color: var(--green); }

    /* Yes/No toggle */
    .yn-wrap {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .yn-btn {
      width: 48px;
      height: 36px;
      border-radius: 10px;
      border: 1.5px solid var(--border2);
      background: var(--bg3);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .yn-btn.selected-yes {
      background: var(--green);
      border-color: var(--green);
      color: #062918;
    }

    .yn-btn.selected-no {
      background: #444;
      border-color: #444;
      color: var(--text);
    }

    .yn-btn.saved {
      opacity: 0.7;
    }

    .save-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--orange);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      color: white;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }

    .save-btn:active { transform: scale(0.92); background: var(--orange-dark); }
    .save-btn.saved { background: var(--green); }
    .save-btn:disabled { opacity: 0.5; }

    /* Rest day */
    .rest-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      padding: 40px 20px;
    }

    .rest-icon { font-size: 56px; line-height: 1; }

    .rest-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    .rest-sub { font-size: 14px; color: #383838; text-align: center; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      flex-direction: column;
      gap: 16px;
    }

    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #062918;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 100px;
      letter-spacing: 0.05em;
      z-index: 999;
      pointer-events: none;
      animation: toastPop 0.2s ease;
      white-space: nowrap;
    }

    .toast.error { background: var(--orange); color: white; }

    @keyframes toastPop {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-logo">NF</div>
    <p class="auth-tagline">Sign in with Google to load your workout and log your weights.</p>
    <button class="auth-btn" id="sign-in-btn">Connect Google</button>
    <div class="error-msg hidden" id="auth-error"></div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="main-screen" class="hidden">
    <div class="header">
      <div class="header-meta">
        <span class="app-name">NickFit</span>
        <span class="date-label" id="date-label"></span>
      </div>
      <div class="day-chips" id="day-chips"></div>
      <div class="day-heading">
        <div class="day-title" id="day-title">—</div>
        <div class="day-subtitle" id="day-subtitle"></div>
      </div>
      <div class="divider"></div>
    </div>

    <div id="content" class="exercises"></div>
  </div>

</div>

<!-- Toast container (outside app for z-index) -->
<div id="toast-el" style="display:none"></div>

<script>
// =====================================================================
// CONFIG — update CLIENT_ID after setting up Google Cloud Console
// =====================================================================
const CLIENT_ID = '671405090900-ma0trn3hgd13qgc4hefhmirs8ep53qk5.apps.googleusercontent.com';
const SPREADSHEET_ID = '1vPNfR9zXAG4XKeW_j6H9q9OKZacUFIBvwYCBIXB1a3I';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

// Map JS getDay() (0=Sun, 1=Mon ... 6=Sat) to sheet tab name
// If a day has no tab, set to null
const DAY_SHEET_MAP = {
  0: 'Sunday',
  1: 'Monday',
  2: 'Tuesday',
  3: 'Wednesday',
  4: 'Thursday',
  5: 'Friday',
  6: 'Saturday',
};

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// =====================================================================
// STATE
// =====================================================================
let accessToken = null;
let selectedDay = new Date().getDay();
let sheetCache = {};     // sheetName -> raw rows array
let parsedCache = {};    // sheetName -> parsed data
let inputs = {};         // rowIndex -> input value
let saved = {};          // rowIndex -> bool

// =====================================================================
// GOOGLE AUTH
// =====================================================================
let tokenClient = null;

function initAuth() {
  if (!window.google?.accounts?.oauth2) {
    setTimeout(initAuth, 300);
    return;
  }
  tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: onAuthResponse,
  });
}

let tokenRefreshResolve = null;

function onAuthResponse(resp) {
  if (resp.error) {
    if (tokenRefreshResolve) { tokenRefreshResolve(false); tokenRefreshResolve = null; }
    showError(resp.error_description || resp.error);
    return;
  }
  accessToken = resp.access_token;
  clearTimeout(window._tokenTimer);
  window._tokenTimer = setTimeout(() => silentRefresh(), 55 * 60 * 1000);

  if (tokenRefreshResolve) {
    tokenRefreshResolve(true);
    tokenRefreshResolve = null;
  } else {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    loadDay(selectedDay);
  }
}

function silentRefresh() {
  if (tokenClient) tokenClient.requestAccessToken({ prompt: '' });
}

function refreshToken() {
  return new Promise((resolve) => {
    tokenRefreshResolve = resolve;
    tokenClient.requestAccessToken({ prompt: '' });
    setTimeout(() => { if (tokenRefreshResolve) { tokenRefreshResolve(false); tokenRefreshResolve = null; } }, 30000);
  });
}

document.getElementById('sign-in-btn').addEventListener('click', () => {
  if (!tokenClient) { showError('Auth not ready yet. Please wait a moment.'); return; }
  document.getElementById('auth-error').classList.add('hidden');
  tokenClient.requestAccessToken();
});

// =====================================================================
// DAY CHIPS
// =====================================================================
function buildDayChips() {
  const container = document.getElementById('day-chips');
  container.innerHTML = '';
  DAY_SHORT.forEach((name, idx) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (idx === selectedDay ? ' active' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => selectDay(idx));
    container.appendChild(btn);
  });
}

function selectDay(idx) {
  selectedDay = idx;
  buildDayChips();
  loadDay(idx);
}

// =====================================================================
// DATE LABEL
// =====================================================================
function updateDateLabel() {
  const d = new Date();
  document.getElementById('date-label').textContent =
    d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

// =====================================================================
// SHEET DATA
// =====================================================================
async function fetchSheet(sheetName, retry = true) {
  if (sheetCache[sheetName]) return sheetCache[sheetName];
  const range = encodeURIComponent(`${sheetName}!A1:Z60`);
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  if (res.status === 401 && retry) {
    const ok = await refreshToken();
    if (ok) return fetchSheet(sheetName, false);
    throw new Error('Session expired — please reload the page');
  }
  if (!res.ok) {
    let errMsg = `Failed to load sheet (${res.status})`;
    try { const j = await res.json(); errMsg = j.error?.message || errMsg; } catch {}
    throw new Error(errMsg);
  }
  const data = await res.json();
  const rows = data.values || [];
  sheetCache[sheetName] = rows;
  return rows;
}

async function writeToSheet(sheetName, rowIdx, colIdx, value, retry = true) {
  const colLetter = colIndexToLetter(colIdx);
  const range = `${sheetName}!${colLetter}${rowIdx + 1}`;
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
    {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${accessToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ values: [[value]] }),
    }
  );
  if (res.status === 401 && retry) {
    const ok = await refreshToken();
    if (ok) return writeToSheet(sheetName, rowIdx, colIdx, value, false);
    throw new Error('Session expired — please reload the page');
  }
  if (!res.ok) {
    let errMsg = `Write failed (${res.status})`;
    try { const j = await res.json(); errMsg = j.error?.message || errMsg; } catch {}
    throw new Error(errMsg);
  }
  return res.json();
}

function colIndexToLetter(idx) {
  // Handle up to ZZ (idx 0 = A, 25 = Z, 26 = AA, etc.)
  let result = '';
  idx++; // 1-based
  while (idx > 0) {
    let rem = (idx - 1) % 26;
    result = String.fromCharCode(65 + rem) + result;
    idx = Math.floor((idx - 1) / 26);
  }
  return result;
}

// =====================================================================
// PARSE SHEET ROWS
// =====================================================================
function parseSheet(rows) {
  // Find the header row (has the day name in col B = index 1)
  let headerRowIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    const b = (rows[i]?.[1] || '').trim();
    if (DAY_NAMES.includes(b)) { headerRowIdx = i; break; }
  }
  if (headerRowIdx < 0) return null;

  const headerRow = rows[headerRowIdx] || [];
  const subtitle = (rows[headerRowIdx + 1]?.[1] || '').trim();

  // Find the next empty date column in the header row (cols start at index 2)
  let nextDateCol = 2;
  for (let c = 2; c < 30; c++) {
    const val = (headerRow[c] || '').trim();
    if (!val) { nextDateCol = c; break; }
    nextDateCol = c + 1;
  }

  // Parse exercises starting 2 rows after header
  const exercises = [];
  const startRow = headerRowIdx + 2;

  for (let i = startRow; i < rows.length; i++) {
    const row = rows[i] || [];
    const name = (row[1] || '').trim();
    if (!name) continue;

    const weight = (row[2] || '').trim();

    // Heuristic for section headers: bold-looking rows with no weight/number pattern
    // They tend to be things like "Primer", "Main Work", "Primer (Activation...)"
    const looksLikeExercise = /[–\-×x×\d]/.test(name) || weight !== '';
    const isSectionHeader = !looksLikeExercise;
    // Rows that are sub-notes of previous exercise (indented or starting with digit like "2–3 sec...")
    const isNote = !isSectionHeader && /^\d+[–\-]/.test(name) && weight === '' && i > startRow;

    exercises.push({ name, weight, rowIndex: i, isSectionHeader, isNote });
  }

  return {
    title: headerRow[1] || DAY_NAMES[selectedDay],
    subtitle,
    exercises,
    headerRowIdx,
    nextDateCol,
  };
}

// =====================================================================
// RENDER
// =====================================================================
async function loadDay(dayIdx) {
  inputs = {};
  saved = {};

  const sheetName = DAY_SHEET_MAP[dayIdx];
  const titleEl = document.getElementById('day-title');
  const subtitleEl = document.getElementById('day-subtitle');
  const content = document.getElementById('content');

  titleEl.textContent = DAY_NAMES[dayIdx];
  subtitleEl.textContent = '';

  if (!sheetName) {
    content.innerHTML = `
      <div class="rest-day">
        <div class="rest-icon">💤</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">No workout scheduled for ${DAY_NAMES[dayIdx]}.<br>Recover well.</div>
      </div>`;
    return;
  }

  content.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-label">Loading workout…</div></div>';

  try {
    let parsed = parsedCache[sheetName];
    if (!parsed) {
      const rows = await fetchSheet(sheetName);
      parsed = parseSheet(rows);
      if (parsed) parsedCache[sheetName] = parsed;
    }

    if (!parsed) {
      content.innerHTML = `<div class="loading"><div class="loading-label">No data found for ${sheetName}</div></div>`;
      return;
    }

    titleEl.textContent = parsed.title;
    subtitleEl.textContent = parsed.subtitle;

    renderExercises(parsed, sheetName);
  } catch (e) {
    content.innerHTML = `<div class="loading"><div class="loading-label" style="color:var(--orange)">${e.message}</div></div>`;
  }
}

function renderExercises(parsed, sheetName) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  parsed.exercises.forEach((ex) => {
    if (ex.isSectionHeader) {
      const el = document.createElement('div');
      el.className = 'section-label';
      el.textContent = ex.name;
      content.appendChild(el);
      return;
    }

    if (ex.isNote) {
      const el = document.createElement('div');
      el.className = 'note-row';
      el.textContent = ex.name;
      content.appendChild(el);
      return;
    }

    const row = document.createElement('div');
    row.className = 'exercise-row';
    row.dataset.rowIndex = ex.rowIndex;

    const info = document.createElement('div');
    info.className = 'ex-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'ex-name';
    nameEl.textContent = ex.name;
    info.appendChild(nameEl);

    if (ex.weight) {
      const prev = document.createElement('div');
      prev.className = 'ex-prev';
      prev.innerHTML = `Last: <b>${ex.weight}</b>`;
      info.appendChild(prev);
    }

    // Detect yes/no exercise based on current weight value
    const isYesNo = /^(yes|no)$/i.test((ex.weight || '').trim());

    if (isYesNo) {
      // Yes/No toggle buttons
      const ynWrap = document.createElement('div');
      ynWrap.className = 'yn-wrap';

      const yesBtn = document.createElement('button');
      yesBtn.className = 'yn-btn';
      yesBtn.textContent = 'Yes';

      const noBtn = document.createElement('button');
      noBtn.className = 'yn-btn';
      noBtn.textContent = 'No';

      let selected = null;

      const selectYN = async (value, activeBtn, otherBtn) => {
        if (activeBtn.classList.contains('saved')) return;
        selected = value;
        inputs[ex.rowIndex] = value;
        activeBtn.classList.add(value === 'yes' ? 'selected-yes' : 'selected-no');
        otherBtn.classList.remove('selected-yes', 'selected-no');
        // Auto-save on tap
        activeBtn.disabled = true;
        otherBtn.disabled = true;
        try {
          await doSaveValue(ex, sheetName, value);
          yesBtn.classList.add('saved');
          noBtn.classList.add('saved');
          showToast(`Saved ${value} ✓`);
        } catch(e) {
          activeBtn.disabled = false;
          otherBtn.disabled = false;
          showToast('Error: ' + e.message, true);
        }
      };

      yesBtn.addEventListener('click', () => selectYN('yes', yesBtn, noBtn));
      noBtn.addEventListener('click', () => selectYN('no', noBtn, yesBtn));

      ynWrap.appendChild(yesBtn);
      ynWrap.appendChild(noBtn);
      row.appendChild(info);
      row.appendChild(ynWrap);
    } else {
      // Regular weight input
      const wrap = document.createElement('div');
      wrap.className = 'ex-input-wrap';

      const input = document.createElement('input');
      input.className = 'ex-input';
      input.type = 'text';
      input.inputMode = 'text';
      input.placeholder = '—';
      input.setAttribute('autocomplete', 'off');
      input.addEventListener('input', () => { inputs[ex.rowIndex] = input.value; });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); doSave(ex, sheetName, input, btn); }
      });

      const btn = document.createElement('button');
      btn.className = 'save-btn';
      btn.textContent = '↑';
      btn.addEventListener('click', () => doSave(ex, sheetName, input, btn));

      wrap.appendChild(input);
      wrap.appendChild(btn);
      row.appendChild(info);
      row.appendChild(wrap);
    }

    content.appendChild(row);
  });
}

// =====================================================================
// SHARED SAVE CORE — finds/creates today's date column and writes value
// =====================================================================
async function saveToSheet(sheetName, exerciseRowIndex, value) {
  const today = new Date();
  const dd = String(today.getDate()).padStart(2, '0');
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const yyyy = today.getFullYear();
  const dateStr = `${dd}/${mm}/${yyyy}`;

  // Always fetch fresh data (no cache) so we have the real header row
  delete sheetCache[sheetName];
  delete parsedCache[sheetName];
  const rows = await fetchSheet(sheetName);

  // Find the header row (row with day name in col B)
  let headerRowIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    if (DAY_NAMES.includes((rows[i]?.[1] || '').trim())) { headerRowIdx = i; break; }
  }
  if (headerRowIdx < 0) throw new Error('Could not find header row in sheet');

  const headerRow = rows[headerRowIdx] || [];

  // Look for today's date already in the header (cols C onwards = index 2+)
  let targetCol = -1;
  for (let c = 2; c < headerRow.length; c++) {
    if ((headerRow[c] || '').trim() === dateStr) { targetCol = c; break; }
  }

  // Not found — find first empty column after existing dates
  if (targetCol < 0) {
    for (let c = 2; c < 50; c++) {
      if (!(headerRow[c] || '').trim()) { targetCol = c; break; }
    }
    if (targetCol < 0) throw new Error('Could not find empty column for today');
    // Write today's date into the header
    await writeToSheet(sheetName, headerRowIdx, targetCol, dateStr);
  }

  // Write the value into the exercise row
  await writeToSheet(sheetName, exerciseRowIndex, targetCol, value);
}

// =====================================================================
// SAVE (value passed directly — used by yes/no toggles)
// =====================================================================
async function doSaveValue(ex, sheetName, value) {
  await saveToSheet(sheetName, ex.rowIndex, value);
}

// =====================================================================
// SAVE (reads from input element — used by weight inputs)
// =====================================================================
async function doSave(ex, sheetName, inputEl, btnEl) {
  const value = inputEl.value.trim();
  if (!value) return;
  if (btnEl.disabled) return;

  btnEl.disabled = true;
  btnEl.textContent = '…';

  try {
    await saveToSheet(sheetName, ex.rowIndex, value);
    inputEl.classList.add('saved');
    btnEl.classList.add('saved');
    btnEl.textContent = '✓';
    showToast(`Saved ${value} ✓`);
  } catch (e) {
    btnEl.disabled = false;
    btnEl.textContent = '↑';
    showToast('Error: ' + e.message, true);
    console.error(e);
  }
}

// =====================================================================
// TOAST
// =====================================================================
let toastTimer = null;

function showToast(msg, isError = false) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);

  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);

  toastTimer = setTimeout(() => el.remove(), 2500);
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// =====================================================================
// INIT
// =====================================================================
window.addEventListener('load', () => {
  updateDateLabel();
  buildDayChips();
  initAuth();
});
